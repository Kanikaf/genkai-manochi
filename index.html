<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>💜 限界まのちぃ</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;touch-action:none;}
body{background:#1a0a2e;font-family:'Segoe UI',sans-serif;overflow:hidden;width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;}
#gw{width:390px;height:844px;max-height:100vh;max-width:100vw;position:relative;overflow:hidden;background:linear-gradient(180deg,#0d0520 0%,#1a0a2e 45%,#2a1040 100%);}
.star{position:absolute;border-radius:50%;background:#fff;animation:twinkle 2s infinite;}
@keyframes twinkle{0%,100%{opacity:.25}50%{opacity:1}}
#hud{position:absolute;top:0;left:0;right:0;padding:6px 12px 6px;z-index:10;background:rgba(13,5,32,.6);backdrop-filter:blur(4px);}
#score-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px;}
#score{color:#f0c4ff;font-size:17px;font-weight:700;text-shadow:0 0 10px #c084fc;}
#time-display{color:#a78bfa;font-size:12px;}
#bonus-display{color:#fbbf24;font-size:11px;font-weight:700;min-width:64px;text-align:right;}
#gauge-zone-labels{display:flex;margin-bottom:1px;}
#gzl-penalty{width:40%;text-align:center;font-size:8px;color:#38bdf8;font-weight:600;}
#gzl-normal{width:40%;text-align:center;font-size:8px;color:#c4b5fd;font-weight:600;}
#gzl-bonus{width:20%;text-align:center;font-size:8px;color:#fbbf24;font-weight:600;}
#gauge-outer{position:relative;height:20px;background:rgba(255,255,255,.08);border-radius:10px;overflow:visible;border:1px solid rgba(200,100,255,.3);}
#gauge-bar{height:100%;border-radius:10px;transition:width .15s;position:relative;z-index:2;}
#gauge-zones{position:absolute;inset:0;border-radius:10px;overflow:hidden;display:flex;z-index:1;}
#gz-penalty{width:40%;height:100%;background:rgba(56,189,248,.2);}
#gz-normal{width:40%;height:100%;background:rgba(167,139,250,.1);}
#gz-bonus{width:20%;height:100%;background:rgba(250,200,50,.25);}
#gz-line1{position:absolute;left:40%;top:0;bottom:0;width:1px;background:rgba(255,255,255,.25);z-index:3;}
#gz-line2{position:absolute;left:80%;top:0;bottom:0;width:1px;background:rgba(250,200,50,.7);z-index:3;}
#gauge-label{position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:9px;color:#fde8ff;font-weight:600;pointer-events:none;z-index:4;}
#gauge-icon{position:absolute;left:5px;top:50%;transform:translateY(-50%);font-size:11px;pointer-events:none;z-index:4;}
#gauge-cursor{position:absolute;top:-3px;bottom:-3px;width:3px;border-radius:2px;background:#fff;box-shadow:0 0 6px #fff;pointer-events:none;z-index:5;transition:left .15s;}
#ga{position:absolute;top:72px;left:0;right:0;bottom:0;}
#lane{position:absolute;bottom:0;left:0;right:0;height:180px;}
#ground{position:absolute;bottom:68px;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,rgba(168,85,247,.4),transparent);}
#char-wrap{position:absolute;left:50%;transform:translateX(-50%);bottom:190px;width:140px;z-index:6;pointer-events:none;transition:bottom 0.2s cubic-bezier(.3,1.5,.6,1);}
#char-img{width:140px;height:180px;object-fit:contain;object-position:bottom;display:block;filter:drop-shadow(0 4px 14px rgba(124,58,237,.6));}
.item{position:absolute;bottom:68px;cursor:pointer;z-index:5;}
.item img{display:block;object-fit:contain;filter:drop-shadow(0 3px 10px rgba(0,0,0,.6));transition:transform .1s;}
.item:active img{transform:scale(1.08);}
.effect{position:absolute;pointer-events:none;z-index:20;font-size:26px;animation:floatUp .85s ease forwards;}
.effect-score{position:absolute;pointer-events:none;z-index:20;font-size:18px;font-weight:900;animation:floatUp .85s ease forwards;white-space:nowrap;}
@keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-65px) scale(1.2)}}
.hit-ring{position:absolute;border-radius:50%;border:3px solid;animation:expandRing .5s ease forwards;pointer-events:none;z-index:15;}
@keyframes expandRing{0%{width:50px;height:50px;opacity:1;margin:-25px}100%{width:110px;height:110px;opacity:0;margin:-55px}}
.screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:30;background:rgba(10,0,25,.93);padding:20px;overflow-y:auto;}
.screen h1{color:#f0c4ff;font-size:25px;text-align:center;margin-bottom:6px;text-shadow:0 0 20px #c084fc;}
.screen p{color:#c4b5fd;font-size:13px;text-align:center;margin-bottom:14px;line-height:1.7;}
.btn{background:linear-gradient(135deg,#7c3aed,#c026d3);color:#fff;border:none;border-radius:24px;padding:13px 34px;font-size:16px;font-weight:700;cursor:pointer;margin:5px;box-shadow:0 4px 18px rgba(168,85,247,.5);}
.btn:active{transform:scale(.96);}
.btn.sec{background:rgba(255,255,255,.1);box-shadow:none;font-size:14px;padding:9px 22px;}
#go-score{font-size:42px;font-weight:900;color:#f0c4ff;text-shadow:0 0 28px #c084fc;margin:6px 0;}
#name-input{background:rgba(255,255,255,.12);border:1px solid rgba(200,100,255,.5);border-radius:12px;color:#fff;font-size:17px;padding:9px 14px;width:190px;text-align:center;outline:none;margin:10px 0;}
#name-input::placeholder{color:rgba(255,255,255,.35);}
#ranking-list{width:100%;max-height:250px;overflow-y:auto;}
.rank-row{display:flex;align-items:center;gap:6px;padding:7px 10px;border-radius:10px;margin-bottom:5px;background:rgba(255,255,255,.07);}
.rank-num{width:24px;font-size:12px;color:#a78bfa;font-weight:700;flex-shrink:0;}
.rank-name{flex:1;color:#e9d5ff;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.rank-score{color:#f0c4ff;font-size:15px;font-weight:700;}
.rank-1{background:rgba(250,200,50,.15);}
.rank-2{background:rgba(200,200,200,.12);}
.rank-3{background:rgba(180,100,30,.15);}
#miss-ov{position:absolute;inset:0;background:rgba(255,0,80,.2);opacity:0;pointer-events:none;z-index:25;transition:opacity .1s;}
#bonus-ov{position:absolute;inset:0;background:rgba(250,200,50,.1);opacity:0;pointer-events:none;z-index:24;transition:opacity .3s;}
#danger-txt{position:absolute;top:40%;left:50%;transform:translate(-50%,-50%);color:#ff3333;font-size:24px;font-weight:900;opacity:0;pointer-events:none;z-index:22;text-shadow:0 0 16px #ff0000;}
#danger-txt.show{animation:dflash .45s infinite;}
@keyframes dflash{0%,100%{opacity:0}50%{opacity:1}}
#bonus-txt{position:absolute;top:36%;left:50%;transform:translate(-50%,-50%);color:#fbbf24;font-size:19px;font-weight:900;opacity:0;pointer-events:none;z-index:22;text-shadow:0 0 14px #f59e0b;white-space:nowrap;}
#bonus-txt.show{animation:bflash .6s infinite;}
@keyframes bflash{0%,100%{opacity:.5}50%{opacity:1}}
#tap-hint{position:absolute;bottom:6px;left:50%;transform:translateX(-50%);color:rgba(200,150,255,.45);font-size:11px;pointer-events:none;}
#hit-zone{position:absolute;bottom:60px;left:50%;transform:translateX(-50%);width:108px;height:100px;border:1px dashed rgba(255,255,255,.12);border-radius:8px;pointer-events:none;z-index:4;}
</style>
</head>

let score=0,gauge=40,gameTime=0,gameRunning=false;
let items=[],animFrame=null,lastTime=0;
let gaugeRate=3,spawnInterval=2200,itemSpeed=2.0;
let lastSpawn=0,bonusZoneTime=0,lastCharKey='';
const CHAR_HOME=190;
const CHAR_DOWN=68;
const CHAR_W=140;
const ITEM_W=100;
const ITEM_H=90;
const HIT_RANGE=54;

const gaugeBar=document.getElementById('gauge-bar');
const scoreEl=document.getElementById('score');
const timeEl=document.getElementById('time-display');
const bonusDisp=document.getElementById('bonus-display');
const charWrap=document.getElementById('char-wrap');
const charImg=document.getElementById('char-img');
const lane=document.getElementById('lane');
const missOv=document.getElementById('miss-ov');
const bonusOv=document.getElementById('bonus-ov');
const dangerTxt=document.getElementById('danger-txt');
const bonusTxt=document.getElementById('bonus-txt');

for(let i=0;i<32;i++){
  const s=document.createElement('div');
  s.className='star';
  const sz=Math.random()*2+1;
  s.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;animation-delay:${Math.random()*3}s;animation-duration:${1.5+Math.random()*2}s`;
  document.getElementById('ga').appendChild(s);
}

function charKey(g){
  if(g<40) return 'c040';
  if(g<60) return 'c4060';
  if(g<80) return 'c6080';
  return 'c80100';
}
function updateChar(){
  const k=charKey(gauge);
  if(k!==lastCharKey){ charImg.src=CHARS[k]; lastCharKey=k; }
}
function sitDown(cb){
  charWrap.style.bottom=CHAR_DOWN+'px';
  setTimeout(()=>{ charWrap.style.bottom=CHAR_HOME+'px'; if(cb) cb(); },300);
}
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.style.display='none');
  document.getElementById(id).style.display='flex';
  if(id==='ranking-screen') renderRanking();
}
function startGame(){
  document.querySelectorAll('.screen').forEach(s=>s.style.display='none');
  score=0; gauge=40; gameTime=0; items=[]; lastSpawn=0;
  gaugeRate=3; spawnInterval=2200; itemSpeed=2.0;
  bonusZoneTime=0; lastCharKey='';
  lane.innerHTML='';
  scoreEl.textContent='🏆 0';
  timeEl.textContent='⏱ 0s';
  bonusDisp.textContent='';
  dangerTxt.classList.remove('show');
  bonusTxt.classList.remove('show');
  bonusOv.style.opacity='0';
  charWrap.style.bottom=CHAR_HOME+'px';
  updateChar(); updateGauge();
  gameRunning=true;
  lastTime=performance.now();
  if(animFrame) cancelAnimationFrame(animFrame);
  animFrame=requestAnimationFrame(gameLoop);
}
function gameLoop(now){
  if(!gameRunning) return;
  const dt=Math.min((now-lastTime)/1000,0.08);
  lastTime=now; gameTime+=dt;
  const t=gameTime;
  const baseRate=3+t*0.05;
  gaugeRate=gauge<40 ? baseRate*1.6 : gauge>=80 ? baseRate*0.6 : baseRate;
  spawnInterval=Math.max(400,1600-t*20);
  itemSpeed=2.0+t*0.045;
  gauge=Math.min(100,gauge+gaugeRate*dt);
  timeEl.textContent=`⏱ ${Math.floor(t)}s`;
  if(gauge>=80){
    bonusZoneTime+=dt;
    if(bonusZoneTime>=3){
      bonusZoneTime=0; score+=200;
      scoreEl.textContent='🏆 '+score;
      showFxScore('+200 ⚡',195,80,'#fbbf24');
      bonusOv.style.opacity='1';
      setTimeout(()=>bonusOv.style.opacity='0',400);
    }
    bonusDisp.textContent=`⚡ ${(3-bonusZoneTime).toFixed(1)}s`;
    bonusTxt.classList.add('show');
    dangerTxt.classList.add('show');
  } else {
    bonusZoneTime=0; bonusDisp.textContent='';
    bonusTxt.classList.remove('show');
    dangerTxt.classList.remove('show');
  }
  updateGauge(); updateChar();
  if(now-lastSpawn>spawnInterval){
    spawnItem(); lastSpawn=now;
    // 最初から複数同時スポーン
    if(Math.random()<0.6) setTimeout(spawnItem, spawnInterval*0.3);
    if(t>10 && Math.random()<0.65) setTimeout(spawnItem, spawnInterval*0.55);
    if(t>25 && Math.random()<0.6) setTimeout(spawnItem, spawnInterval*0.75);
    if(t>45 && Math.random()<0.5) setTimeout(spawnItem, spawnInterval*0.9);
  }
  const ww=document.getElementById('gw').offsetWidth||390;
  items=items.filter(it=>{
    const spd=it.speed*(it.fr?-1:1)*60*dt;
    it.x+=spd; it.el.style.left=it.x+'px';
    if((it.fr&&it.x<-120)||((!it.fr)&&it.x>ww+20)){ it.el.remove(); return false; }
    return true;
  });
  if(gauge>=100){ gameOver(); return; }
  animFrame=requestAnimationFrame(gameLoop);
}
function spawnItem(){
  if(!gameRunning) return;
  const ww=document.getElementById('gw').offsetWidth||390;
  const fr=Math.random()<0.5;
  const chairChance=0.3+Math.min(gameTime*0.007,0.28);
  const isChair=Math.random()<chairChance;
  const spd=itemSpeed*(0.65+Math.random()*0.85);
  const el=document.createElement('div');
  el.className='item';
  const img=document.createElement('img');
  img.src=isChair?ISU:BENKI;
  img.width=ITEM_W; img.height=ITEM_H;
  el.appendChild(img);
  el.style.left=(fr?ww+10:-120)+'px';
  lane.appendChild(el);
  const obj={el,fr,x:fr?ww+10:-120,type:isChair?'chair':'toilet',speed:spd};
  items.push(obj);
  el.addEventListener('touchstart',e=>{e.preventDefault();handleTap(obj);},{passive:false});
  el.addEventListener('mousedown',e=>{e.preventDefault();handleTap(obj);});
}
function handleTap(obj){
  if(!gameRunning) return;
  const idx=items.indexOf(obj);
  if(idx===-1) return;
  items.splice(idx,1);
  obj.el.remove();
  const cx=195, cy=150;
  if(obj.type==='toilet'){
    if(gauge<40){
      score-=100; gauge=Math.min(100,gauge+3);
      showFxEmoji('😑💨',cx,cy-60);
      showFxScore('-100 出しすぎ！',cx-20,cy-36,'#38bdf8');
      showRing(cx,cy,'#38bdf8'); flashMiss();
    } else {
      score+=100; gauge=Math.max(0,gauge-12);
      showFxEmoji('✨',cx,cy-60);
      showFxScore('+100',cx,cy-36,'#4ade80');
      showRing(cx,cy,'#4ade80');
    }
  } else {
    score-=300; gauge=Math.min(100,gauge+10);
    showFxEmoji('💥',cx,cy-60);
    showFxScore('-300 誤爆！',cx,cy-36,'#f87171');
    showRing(cx,cy,'#f87171'); flashMiss();
  }
  scoreEl.textContent='🏆 '+score;
  sitDown(()=>{ updateGauge(); updateChar(); });
  updateGauge(); updateChar();
}
function showFxEmoji(emoji,x,y){
  const e=document.createElement('div');
  e.className='effect'; e.textContent=emoji;
  e.style.cssText=`left:${x-16}px;top:${y}px;`;
  document.getElementById('ga').appendChild(e);
  setTimeout(()=>e.remove(),870);
}
function showFxScore(text,x,y,color){
  const e=document.createElement('div');
  e.className='effect-score'; e.textContent=text;
  e.style.cssText=`left:${x-24}px;top:${y}px;color:${color};`;
  document.getElementById('ga').appendChild(e);
  setTimeout(()=>e.remove(),870);
}
function showRing(x,y,color){
  const r=document.createElement('div');
  r.className='hit-ring';
  r.style.cssText=`left:${x}px;top:${y}px;border-color:${color};`;
  document.getElementById('ga').appendChild(r);
  setTimeout(()=>r.remove(),500);
}
function flashMiss(){
  missOv.style.opacity='1';
  setTimeout(()=>missOv.style.opacity='0',220);
}
function updateGauge(){
  gaugeBar.style.width=gauge+'%';
  if(gauge>=80) gaugeBar.style.background='linear-gradient(90deg,#a78bfa,#f59e0b,#fbbf24)';
  else if(gauge>=60) gaugeBar.style.background='linear-gradient(90deg,#a78bfa,#fb923c)';
  else if(gauge>=40) gaugeBar.style.background='linear-gradient(90deg,#a78bfa,#f472b6)';
  else gaugeBar.style.background='linear-gradient(90deg,#38bdf8,#818cf8)';
  const cursor=document.getElementById('gauge-cursor');
  if(cursor) cursor.style.left=`calc(${gauge}% - 1.5px)`;
}
function gameOver(){
  gameRunning=false;
  cancelAnimationFrame(animFrame);
  dangerTxt.classList.remove('show');
  bonusTxt.classList.remove('show');
  charImg.src=CHARS.cgo;
  const ef=document.createElement('div');
  ef.style.cssText='position:absolute;top:25%;left:50%;transform:translateX(-50%);font-size:56px;z-index:28;animation:floatUp 1.6s ease forwards;pointer-events:none;';
  ef.textContent='💦💦';
  document.getElementById('ga').appendChild(ef);
  setTimeout(()=>ef.remove(),1700);
  setTimeout(()=>{
    document.getElementById('go-score').textContent=score+'点';
    showScreen('go-screen');
  },1300);
}
async function submitScore(){
  const name=document.getElementById('name-input').value.trim()||'名無し';
  const btn=document.querySelector('#go-screen .btn');
  if(btn){btn.textContent='送信中…';btn.disabled=true;}
  try{await fetch(GAS,{method:'POST',body:JSON.stringify({name,score,date:new Date().toLocaleDateString('ja-JP')})});}catch(e){}
  if(btn){btn.textContent='📝 登録する';btn.disabled=false;}
  showScreen('ranking-screen');
}
async function loadRanking(){
  try{const r=await fetch(GAS);const d=await r.json();return d.ok?d.ranking:[];}
  catch(e){return [];}
}
async function renderRanking(){
  const list=document.getElementById('ranking-list');
  list.innerHTML='<p style="color:#a78bfa;text-align:center;font-size:13px">読み込み中…</p>';
  const ranking=await loadRanking();
  if(!ranking.length){list.innerHTML='<p style="color:#a78bfa;text-align:center">まだ記録がありません</p>';return;}
  const medals=['🥇','🥈','🥉'];
  list.innerHTML=ranking.map((r,i)=>`
    <div class="rank-row ${i<3?'rank-'+(i+1):''}">
      <div class="rank-num">${medals[i]||i+1}</div>
      <div class="rank-name">${escHtml(r.name)}</div>
      <div class="rank-score">${r.score}点</div>
      <div style="font-size:10px;color:#7c3aed;min-width:32px;text-align:right">${r.date||''}</div>
    </div>`).join('');
}
function escHtml(s){return s.replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
document.getElementById('ga').addEventListener('touchstart',e=>{
  if(!gameRunning) return;
  if(e.target.closest('.item')) return;
  e.preventDefault();
  tapClosest(e.touches[0].clientX);
},{passive:false});
document.getElementById('ga').addEventListener('mousedown',e=>{
  if(!gameRunning) return;
  if(e.target.closest('.item')) return;
  tapClosest(e.clientX);
});
function tapClosest(tx){
  const charX=195;
  let closest=null,minDist=Infinity;
  items.forEach(it=>{
    const ix=it.x+ITEM_W/2;
    const d=Math.abs(ix-charX);
    if(d<minDist){minDist=d;closest=it;}
  });
  if(closest && minDist<HIT_RANGE){
    handleTap(closest);
  } else {
    charWrap.style.bottom=CHAR_DOWN+'px';
    setTimeout(()=>charWrap.style.bottom=CHAR_HOME+'px',200);
    showFxScore('空振り！',charX-30,130,'rgba(200,150,255,.9)');
  }
}
showScreen('title-screen');
</script>
</body>
</html>
